# example_config.yaml — 完整參數參考
# 用法：python run_pipeline.py --config example_config.yaml --gpu 0
#
# 規則：
#   - 省略的參數 → 沿用 track_crop_roi.py 中的預設值
#   - cameras 最多 6 台；video_path 填 null 或整台省略 → 停用該台
# =======================================================================


# -----------------------------------------------------------------------
# 相機設定（必填：video_path；其餘選填）
# -----------------------------------------------------------------------
cameras:
  - video_path: /path/to/your/camera1.mp4   # 請填入相機 1 影片的絕對路徑
    crop: [0, 450, 1920, 800]   # [x起, y起, x終, y終]，送 YOLO 前先裁剪，縮小搜索範圍
    roi_x: [150, 1820]          # bbox 中心 x 的有效範圍；超出此範圍的偵測結果會被過濾
    roi_y: [0, 9999]            # bbox 中心 y 的有效範圍；通常不限制可省略
    switch_x: 1800              # 跑者 center_x（原始座標）超過此值 → 切換到下一台
                                # 最後一台改用 bx2（右緣）判斷；省略 → 跑完整段再切

  - video_path: /path/to/your/camera2.mp4   # 請填入相機 2 影片的絕對路徑
    crop: [0, 450, 1920, 800]
    roi_x: [150, 1820]
    switch_x: 1800

  # 多 ROI 區域寫法（與 roi_x/roi_y 二擇一）：
  # - video_path: /data/cam3.mp4
  #   roi_zones:
  #     - x: [0, 800]
  #       y: [0, 9999]
  #     - x: [1000, 1920]
  #       y: [0, 9999]
  #   switch_x: 1800


# -----------------------------------------------------------------------
# 輸出設定
# -----------------------------------------------------------------------
# output_dir: /path/to/your/output_cut   # 輸出目錄（預設：repo 根目錄下的 output_cut/）
auto_crop: true     # 自動以 bbox 中位數 × 2 決定裁剪尺寸（兩遍掃描，無需手動填寬高）
# crop_width: 200     # 手動指定輸出寬度（auto_crop: true 時忽略此項）
# crop_height: 260    # 手動指定輸出高度（auto_crop: true 時忽略此項）
# show_overlay: true  # true = 顯示綠色 bbox + 藍色 ROI 框；false = 乾淨畫面


# -----------------------------------------------------------------------
# 移動偵測參數
# -----------------------------------------------------------------------
# movement_threshold: 2    # 連續兩幀中心位移 > N px 才算「有移動」
# min_movement_frames: 3   # 需連續移動至少 N 幀，才認定為「真正在跑」
# stationary_decay: 2      # 靜止時每幀讓 movement_count 遞減的量（越大重置越快）
# max_person_memory: 30    # 超過 N 幀未偵測到則清除該人物的速度紀錄
